<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Skill Star | Burn The Box</title>
    <style>
        body {
            background-color: #0a0a23; /* Deep dark blue */
            color: #e0e0ff; /* Soft purple-white */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        h1 {
            color: #d4af37; /* Metallic Gold */
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px #4b0082; /* Indigo shadow */
        }

        .manifesto {
            font-size: 1.5rem;
            max-width: 600px;
            border-left: 5px solid #8a2be2; /* Neon Purple accent */
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
        }

        .cta-button {
            margin-top: 30px;
            padding: 15px 30px;
            background-color: #8a2be2;
            color: white;
            border: 2px solid #d4af37;
            border-radius: 50px; /* The "Pill" shape! */
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .cta-button:hover {
            background-color: #d4af37;
            color: #0a0a23;
        }
    </style>
</head>
<body>

    <h1>SKILL STAR</h1>
    
    <div class="manifesto">
        "Stop paying for permission to work. Your skills are your currency—show them, don't write them."
    </div>

    <button class="cta-button">DEMONSTRATE YOUR SKILL</button>

</body>
</html>
