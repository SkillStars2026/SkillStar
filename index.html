<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillStar | The Elevator</title>
    <style>
        body {
            background: linear-gradient(135deg, #1a0633 0%, #4c1d95 100%);
            color: #f3e8ff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        #panel {
            width: 100px;
            background: #2e1065;
            border-right: 4px solid #7c3aed;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
            gap: 15px;
        }
        .button {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid #a78bfa;
            background: transparent;
            color: #a78bfa;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .button:hover {
            background: #7c3aed;
            color: white;
            box-shadow: 0 0 15px #a78bfa;
        }
        #display {
            flex-grow: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .character-box {
            display: flex;
            gap: 50px;
            margin-top: 30px;
        }
        .character {
            padding: 20px;
            border-radius: 15px;
            width: 220px;
        }
        #rex { background: rgba(31, 41, 55, 0.85); border: 2px solid #6b7280; }
        #ruby { background: rgba(131, 24, 67, 0.85); border: 2px solid #be185d; }
        h1 { font-size: 3.5rem; margin: 0; color: #d8b4fe; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <div id="panel">
        <button class="button">K</button>
        <button class="button">1</button>
        <button class="button">2</button>
        <button class="button">★</button>
    </div>
    <div id="display">
        <h1>SkillStar</h1>
        <p style="font-size: 1.2rem;">Welcome to the Elevator. Where do you want to show your skills?</p>
        <div class="character-box">
            <div id="rex" class="character">
                <h3>REX</h3>
                <p>"Focus on the task. Keep it professional."</p>
            </div>
            <div id="ruby" class="character">
                <h3>RUBY</h3>
                <p>"Oh! I just found a vintage silver tea ball in my pocket! Isn't it lovely?"</p>
            </div>
        </div>
    </div>
</body>
</html>
