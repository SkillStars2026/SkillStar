
​<!DOCTYPE html>
<html>
<head>
<title>Skill Star Elevator</title>
<style>
body { background-color: #0d001a; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
.elevator-container { position: relative; }
img { max-width: 100%; height: auto; display: block; }
</style>
</head>
<body>
​<div class="elevator-container">
<img src="elevator_panel_design.jpg" usemap="#elevator-map" alt="Skill Star Elevator Panel">
​<map name="elevator-map">
<area shape="rect" coords="50,50,200,100" alt="Creative Arts" href="#" onclick="triggerFloor('creative_arts'); return false;">
<area shape="rect" coords="50,120,200,170" alt="General Labor" href="#" onclick="triggerFloor('general_labor'); return false;">
<area shape="rect" coords="50,190,200,240" alt="Tech Floor" href="#" onclick="triggerFloor('tech'); return false;">
<area shape="rect" coords="50,260,200,310" alt="Customer Service" href="#" onclick="triggerFloor('customer_service'); return false;">
<area shape="rect" coords="50,330,200,380" alt="The Kitchen" href="#" onclick="triggerFloor('kitchen'); return false;">
</map>
</div>
​<script>
function triggerFloor(floorName) {
let audioFile = '';
switch(floorName) {
case 'kitchen': audioFile = 'yes_chef_sizzle.mp3'; break;
case 'customer_service': audioFile = 'grandma_hangup_drink.mp3'; break;
case 'tech': audioFile = 'keyboard_chime.mp3'; break;
case 'general_labor': audioFile = 'drill_hammer.mp3'; break;
case 'creative_arts': audioFile = 'phantom_theatrical_chord.mp3'; break;
}
if(audioFile) {
const audio = new Audio('assets/sounds/' + audioFile);
audio.play().catch(e => console.log("Audio waiting for click."));
}
}
</script>
​</body>
</html>
