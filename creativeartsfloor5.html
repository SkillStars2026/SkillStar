
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Star - Floor 5</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background-color: #2D0B1E; color: white; font-family: 'Playfair Display', serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        #elevator-container { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; }
        #montage-screen { position: absolute; width: 100%; height: 100%; background-size: contain; background-repeat: no-repeat; background-position: center; }
        
        #handoff-screen { 
            display: none; position: absolute; z-index: 100; width: 100%; height: 100%; 
            background-color: #2D0B1E; flex-direction: column; justify-content: center; 
            align-items: center; text-align: center; 
            opacity: 0; 
            transition: opacity 2s ease-in-out; 
        }

        /* Spaced out, supportive phrasing */
        #status-text { 
            color: #d4af37; 
            font-size: 1.1rem; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            margin-bottom: 25px; 
            line-height: 2.2;
        }

        /* The Canva Pink with a soft, muted glow */
        .jive-text { 
            font-family: 'Brush Script MT', cursive; 
            font-size: 2.2rem; 
            color: #FF1493; /* That bright Canva pink */
            display: block; 
            margin: 15px 0;
            text-transform: none; 
            /* Soft, supportive shimmer - not too bright */
            text-shadow: 0 0 10px rgba(253, 245, 230, 0.4); 
        }

        .gold-button { 
            background: linear-gradient(#FFD700, #B8860B); 
            color: black; border: 1px solid white; 
            padding: 12px 35px; font-weight: bold; border-radius: 8px; 
            font-size: 1rem; cursor: pointer; margin-top: 40px; 
            font-family: 'Playfair Display', serif; text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div id="elevator-container">
        <div id="montage-screen"></div>
        <div id="handoff-screen">
            <div id="status-text">
                The Stage is Warm...<br>
                <span class="jive-text">Go change those Jitters to Jives.</span>
                Go Shine!<br>
                <span style="font-size: 0.9rem; letter-spacing: 5px; display: block; margin-top: 20px;">The Floor is Yours.</span>
            </div>
            <button class="gold-button">UPLOAD YOUR SKILL</button>
        </div>
    </div>
    <script>
        const images = ['1000033446.png', '1000033447.jpg'];
        images.forEach(src => { const img = new Image(); img.src = src; });
        let idx = 0;
        const screen = document.getElementById('montage-screen');
        const handoff = document.getElementById('handoff-screen');
        screen.style.backgroundImage = `url('${images[idx]}')`;

        // Faster cycle so you see more in less time
        const interval = setInterval(() => {
            idx = (idx + 1) % images.length;
            screen.style.backgroundImage = `url('${images[idx]}')`;
        }, 1200);

        // Dropped to 6 seconds for a snappier feel
        setTimeout(() => {
            clearInterval(interval);
            screen.style.display = 'none';
            handoff.style.display = 'flex';
            setTimeout(() => { handoff.style.opacity = '1'; }, 50); 
        }, 6000);
    </script>
</body>
</html>
