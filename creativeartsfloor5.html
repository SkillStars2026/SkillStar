<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Star - Floor 5</title>
    <style>
        body { margin: 0; background-color: #2D0B1E; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        #elevator-container { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; }
        
        #montage-screen { position: absolute; width: 100%; height: 100%; background-size: contain; background-repeat: no-repeat; background-position: center; }
        
        /* THE INVITING FINALE */
        #handoff-screen { 
            display: none; position: absolute; z-index: 100; width: 100%; height: 100%; 
            background-color: #2D0B1E; 
            background-image: url('finale_girl.png'); /* YOUR DESIGN NAME HERE */
            background-size: contain; background-repeat: no-repeat; background-position: center;
            opacity: 0; 
            transition: opacity 2.5s ease-in-out; 
        }

        .gold-button { 
            position: absolute; bottom: 12%; 
            background: linear-gradient(#FFD700, #B8860B); 
            color: black; border: 1px solid white; 
            padding: 12px 40px; font-weight: bold; border-radius: 50px; 
            font-size: 1rem; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
        }
    </style>
</head>
<body>
    <div id="elevator-container">
        <div id="montage-screen"></div>
        <div id="handoff-screen">
            <button class="gold-button">UPLOAD YOUR SKILL</button>
        </div>
    </div>
    <script>
        const images = ['1000033446.png', '1000033447.jpg'];
        images.forEach(src => { const img = new Image(); img.src = src; });
        
        let idx = 0;
        const screen = document.getElementById('montage-screen');
        const handoff = document.getElementById('handoff-screen');
        screen.style.backgroundImage = `url('${images[idx]}')`;

        const interval = setInterval(() => {
            idx = (idx + 1) % images.length;
            screen.style.backgroundImage = `url('${images[idx]}')`;
        }, 1200);

        // 5-second montage before the Rockstar Invitation
        setTimeout(() => {
            clearInterval(interval);
            screen.style.display = 'none';
            handoff.style.display = 'flex';
            handoff.style.justifyContent = 'center'; 
            setTimeout(() => { handoff.style.opacity = '1'; }, 50); 
        }, 5000);
    </script>
</body>
</html>
